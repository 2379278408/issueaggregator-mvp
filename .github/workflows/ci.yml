name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: python -m unittest discover -s tests

      - name: Run E2E tests
        working-directory: backend
        env:
          APP_ENV: test
        run: |
          python tests/e2e_public_feedback_guardrails.py
          python tests/e2e_admin_batch_flow.py
          python tests/e2e_github_submit_flow.py
          python tests/e2e_admin_session_flow.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
