version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: issue-aggregator-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/data:/app/data
      - ./backend/tests:/app/tests:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: issue-aggregator-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    depends_on:
      - backend
    restart: unless-stopped
